appId: com.reading-trainer.app
productName: Reading Trainer
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - package.json
# 네이티브 모듈은 asar에서 풀어야 런타임 로드 가능
asarUnpack:
  - "**/node_modules/better-sqlite3/**"
extraResources:
  - from: data
    to: data
win:
  icon: build/icon.ico
  target:
    - nsis
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: Reading Trainer
