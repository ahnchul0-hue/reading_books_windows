<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7BBDF5"/>
      <stop offset="1" stop-color="#3F76D6"/>
    </linearGradient>
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFD37A" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#FFC247" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#FFD37A" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#1B3D78" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="225" fill="url(#bg)"/>

  <!-- open book -->
  <g filter="url(#soft)">
    <path d="M512 318 C 426 266, 300 262, 222 300 L222 736 C 300 698, 426 702, 512 752 Z" fill="#FFFFFF"/>
    <path d="M512 318 C 598 266, 724 262, 802 300 L802 736 C 724 698, 598 702, 512 752 Z" fill="#EEF3FF"/>
    <rect x="500" y="316" width="24" height="436" rx="12" fill="#D7E0F4"/>
  </g>

  <!-- left page lines -->
  <g fill="#C7D2E8">
    <rect x="286" y="372" width="176" height="22" rx="11"/>
    <rect x="286" y="492" width="176" height="22" rx="11"/>
    <rect x="286" y="552" width="176" height="22" rx="11"/>
    <rect x="286" y="612" width="140" height="22" rx="11"/>
  </g>
  <!-- right page lines -->
  <g fill="#C7D2E8">
    <rect x="562" y="372" width="176" height="22" rx="11"/>
    <rect x="562" y="432" width="176" height="22" rx="11"/>
    <rect x="562" y="492" width="176" height="22" rx="11"/>
    <rect x="562" y="552" width="140" height="22" rx="11"/>
  </g>

  <!-- highlighted current line + sweep bar -->
  <rect x="270" y="424" width="208" height="38" rx="14" fill="#FFF3D4"/>
  <rect x="262" y="416" width="540" height="54" rx="27" fill="url(#sweep)"/>
  <rect x="430" y="410" width="58" height="66" rx="16" fill="#FFB020"/>

  <!-- sparkles -->
  <g fill="#FFFFFF">
    <path d="M792 196 l16 40 40 16 -40 16 -16 40 -16 -40 -40 -16 40 -16 Z" opacity="0.95"/>
    <circle cx="236" cy="232" r="14" opacity="0.9"/>
    <circle cx="836" cy="792" r="12" opacity="0.85"/>
  </g>
</svg>
